- id: g-finance-pci-dss-access-control
  name: pci-dss-access-control
  description: Access to system components and cardholder data MUST be identified and
    authenticated (PCI-DSS v4 Requirement 8 identify users and authenticate access
    to system components). Architecture MUST document (a) the identity provider,
    (b) the MFA approach for all access into the CDE (Requirement 8.4.2 mandatory
    MFA), (c) the account-lockout policy, (d) the session-timeout policy.
  detector: cloud-guidance-rule.sh
