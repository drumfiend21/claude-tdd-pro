- id: g-eu-dora-third-party-ict-oversight
  name: dora-third-party-ict-oversight
  description: Financial entities MUST manage ICT third-party risk and maintain a register
    of information on all contractual arrangements with ICT third-party providers
    (DORA Article 28 third-party ICT risk). Architecture MUST document the third-party
    inventory approach, the exit strategy per critical service, and the concentration-
    risk analysis.
