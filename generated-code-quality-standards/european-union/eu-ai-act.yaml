- id: g-eu-ai-act-technical-documentation
  name: eu-ai-act-technical-documentation
  description: Providers MUST draw up technical documentation before placing a high-risk
    AI system on the market (EU AI Act Article 11 technical documentation). Documentation
    MUST include (a) general description of the system, (b) detailed description of
    elements and development process, (c) monitoring/functioning/control, (d) performance
    metrics, (e) risk management, (f) post-market monitoring plan.
  detector: cloud-guidance-rule.sh
