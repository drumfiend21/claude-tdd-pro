- id: g-eu-ai-act-record-keeping
  name: eu-ai-act-record-keeping
  description: High-risk AI systems MUST technically allow for the automatic recording
    of events (logs) over the duration of the lifetime of the system (EU AI Act Article
    12 record-keeping). Logs MUST enable tracing of the system's functioning appropriate
    to the intended purpose. Architecture MUST document the logging strategy, retention
    period, and audit-log integrity approach.
  detector: cloud-guidance-rule.sh
