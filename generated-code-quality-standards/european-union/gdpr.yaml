- id: g-eu-gdpr-cross-border-transfer
  name: gdpr-cross-border-transfer
  description: Transfers of personal data to third countries require an adequacy decision,
    appropriate safeguards, or derogations (GDPR Chapter V, Articles 44-50). Architecture
    MUST name the mechanism used for any cross-border transfer (adequacy decision,
    Standard Contractual Clauses, Binding Corporate Rules, Article 49 derogation).
