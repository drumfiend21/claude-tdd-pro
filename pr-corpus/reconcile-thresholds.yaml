# L-5 two-pass reconciler threshold calibration config.
#
# Architecture §12 L-5: "thresholds calibrated against held-out O-1 set".
# Values here are the tuned defaults; operators may override via
# `_operator/<my-org>/reconcile-thresholds.yaml` per §2.22 cascade.
#
# Calibration baseline: held-out O-1 seed corpus (§13 O-1 — 20
# hand-curated PR-corpus patterns + 12 hand-written postmortems). Tune
# these by re-running pass-1 cosine retrieval against the held-out O-1
# baseline and measuring shortlist precision / recall on the known
# same-rule pairs.
calibration_baseline: held-out O-1 seed corpus
pass_1_cosine_shortlist:
  top_k: 5
  min_similarity: 0.65
pass_2_subagent_label_vocabulary:
  - same
  - refinement
  - adjacent
  - novel
  - conflict
