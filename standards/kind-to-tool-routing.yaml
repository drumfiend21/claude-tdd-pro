# standards/kind-to-tool-routing.yaml — ADR-0009 stage-3 routing table.
#
# Maps 4-axis canonical kinds (ADR-0008 vocabulary) to the FOSS enforcement tool(s) that
# should carry the rule, producing a rule's `enforced_by[]` (ADR-0008 schema). The composite
# engine walks enforced_by[] in order; first matching binding wins per file.
#
# LICENSING (operator directive — everything open-source, free for commercial use): every tool
# named here is open source. Tools we would MIRROR config/rulesets from are permissive
# (MIT/Apache-2.0). Tools that are GPL/LGPL are INVOKE-ONLY — run as arms-length external
# subprocesses, never bundled or distributed in this repo (commercial *use* of GPL/LGPL CLIs is
# unrestricted; only redistribution of modified source is encumbered, which we never do). Where a
# permissive tool covers the same kind, it is listed first (primary).

linguist_aliases:
  typescript:
    - { tool: eslint, license: MIT }
    - { tool: semgrep, license: LGPL-2.1, invoke_only: true }
  javascript:
    - { tool: eslint, license: MIT }
    - { tool: semgrep, license: LGPL-2.1, invoke_only: true }
  python:
    - { tool: ruff, license: MIT }
    - { tool: semgrep, license: LGPL-2.1, invoke_only: true }
  go:
    - { tool: semgrep, license: LGPL-2.1, invoke_only: true }
  hcl:
    - { tool: checkov, license: Apache-2.0 }
    - { tool: trivy, license: Apache-2.0 }
  markdown:
    - { bundle: architectural-content }

iac_dialects:
  terraform:
    - { tool: checkov, license: Apache-2.0 }
    - { tool: trivy, license: Apache-2.0 }
  kubernetes:
    - { tool: kubescape, license: Apache-2.0 }
    - { tool: checkov, license: Apache-2.0 }
  helm:
    - { tool: checkov, license: Apache-2.0 }
  cloudformation:
    - { tool: cfn-lint, license: MIT-0 }
    - { tool: checkov, license: Apache-2.0 }
  github_actions:
    - { tool: zizmor, license: MIT }
    - { tool: checkov, license: Apache-2.0 }
  gitlab_ci:
    - { tool: checkov, license: Apache-2.0 }
  dockerfile:
    - { tool: checkov, license: Apache-2.0 }       # primary: permissive
    - { tool: hadolint, license: GPL-3.0, invoke_only: true }
  ansible:
    - { tool: checkov, license: Apache-2.0 }
  openapi:
    - { tool: spectral, license: Apache-2.0 }

purl_uses:
  npm:
    - { tool: osv-scanner, license: Apache-2.0 }
  pypi:
    - { tool: osv-scanner, license: Apache-2.0 }
  maven:
    - { tool: osv-scanner, license: Apache-2.0 }

# When a rule classifies applies_to_prose:true, the architectural-content bundle is auto-attached
# unconditionally (ADR-0009 stage 4), in addition to any code-shape bindings above.
prose:
  - { bundle: architectural-content }

# The architectural-content bundle members (whole-or-nothing; ADR-0008). All permissive or
# invoke-only-FOSS; prose-judge.sh is CTP's own semantic moat.
bundles:
  architectural-content:
    - { tool: markdownlint, license: MIT }
    - { tool: remark-lint, license: MIT }
    - { tool: vale, license: MIT }
    - { tool: textlint, license: MIT }
    - { tool: cspell, license: MIT }
    - { tool: lychee, license: "Apache-2.0 OR MIT" }
    - { tool: reuse, license: Apache-2.0, invoke_only: true }
    - { tool: prose-judge.sh, license: in-repo }
