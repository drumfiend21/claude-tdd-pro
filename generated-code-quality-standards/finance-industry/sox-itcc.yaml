- id: g-finance-sox-access-review
  name: sox-itcc-access-review
  description: SOX ITGC requires periodic access review of privileged accounts on
    financially-material systems (PCAOB AS 2201). Architecture MUST document (a) the
    access-review cadence (quarterly minimum for privileged access), (b) the reviewer
    role (business owner, not IT admin), (c) evidence retention of the review outcome,
    (d) the revocation SLA post-review.
