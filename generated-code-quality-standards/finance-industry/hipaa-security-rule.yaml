- id: g-finance-hipaa-audit-controls
  name: hipaa-audit-controls
  description: Covered entities MUST implement hardware, software, and/or procedural
    mechanisms to record and examine activity in information systems containing ePHI
    (HIPAA Security Rule 45 CFR §164.312(b) audit controls). Architecture MUST document
    (a) the audit-log capture strategy per ePHI-touching system, (b) the retention
    period (minimum 6 years per 45 CFR §164.316(b)(2)(i)), (c) the log-review cadence.
