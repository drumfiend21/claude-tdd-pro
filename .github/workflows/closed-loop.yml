name: closed-loop
# L-24 + S-19 + C-21 closed-loop validation gate. Runs each phase's
# end-to-end pipeline against a synthetic source/pattern/framework and
# blocks releases when any chain breaks.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  closed-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PR-corpus closed-loop (L-24)
        run: bash pr-corpus/closed-loop-test.sh --rules-out /tmp/ci-pr-rules

      - name: Standards closed-loop (S-19)
        run: bash standards/closed-loop-validate.sh --synthetic-source ci-test-std --rules-out /tmp/ci-std-rules

      - name: Compliance closed-loop (C-21)
        if: hashFiles('compliance/closed-loop-validate.sh') != ''
        run: bash compliance/closed-loop-validate.sh --synthetic-framework ci-test-fw

      - name: Cloud-architecture convention enforcement (S-30 / §27.28)
        # Wires S-30 cloud-convention enforcement into the CI execution surface
        # (the through-line: every enforcement runs in three surfaces with the same
        # exit-code contract). Safe-by-default: a repo with no cloud IaC is a green
        # no-op, so this never fails a non-cloud repo; it fails only on real IaC drift.
        run: bash commands/doctor.sh --check cloud-conventions --root .

      - name: Vulnerability + SBOM gate (X-10 / §28.1)
        # Wires H-14 (dependency vulnerability remediation gate) + H-15 (SBOM) into CI
        # with the same exit-code contract. Safe-by-default: a repo with no declared
        # dependencies is a green no-op, so this never fails a previously-green repo;
        # it fails only on a real critical/high finding that names its fixed_in version.
        run: bash commands/doctor.sh --check vuln-scan --root .
