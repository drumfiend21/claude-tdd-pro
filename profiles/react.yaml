name: react
description: "React 19 + Server Components profile. Activates all 10 g-react-* rules (R-2) at recommended severity, with R-2-table options for g-react-007 and g-react-008. Per architecture section 16 R-7."

extends:
  - react:rsc-rfc
  - react:react-docs
  - react:nextjs-docs
  - w3c:wcag-2-2
  - google:testing-blog
  - web-vitals:core-web-vitals

include:
  detectors:
    - rsc-boundary.sh
    - a11y-axe.sh
    - exhaustive-deps.sh
    - bundle-budget.sh
  agents:
    - review-react-rsc
    - review-react-a11y
  rubric_rules:
    - g-react-001
    - g-react-002
    - g-react-003
    - g-react-004
    - g-react-005
    - g-react-006
    - g-react-007
    - g-react-008
    - g-react-009
    - g-react-010

rules:
  g-react-001: error
  g-react-002: error
  g-react-003: error
  g-react-004: warn
  g-react-005: error
  g-react-006: error
  g-react-007: ["error", { test_runner: "vitest", allow_snapshot_only: false }]
  g-react-008: ["error", { budget_kb: 250, per_route: {}, excluded_routes: [] }]
  g-react-009: error
  g-react-010: warn
