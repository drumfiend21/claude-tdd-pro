rules:
- id: g-finance-hipaa-technical-safeguards
  name: hipaa-technical-safeguards
  description: Covered entities MUST implement technical safeguards for electronic
    protected health information (HIPAA Security Rule 45 CFR §164.312 technical safeguards).
    Architecture MUST document (a) access control (unique user ID, emergency access
    procedure, automatic logoff, encryption/decryption), (b) integrity controls,
    (c) transmission security (integrity + encryption).
