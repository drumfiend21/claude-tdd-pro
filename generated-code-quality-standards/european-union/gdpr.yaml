- id: g-eu-gdpr-security-of-processing
  name: gdpr-security-of-processing
  description: Controllers and processors MUST implement appropriate technical and
    organizational measures to ensure a level of security appropriate to the risk
    (GDPR Article 32). Includes pseudonymization/encryption, ongoing confidentiality
    /integrity/availability/resilience of systems, backup + restoration, and regular
    testing. Architecture MUST document the encryption approach (at-rest + in-transit)
    and backup/restore procedures.
  detector: cloud-guidance-rule.sh
  type: problem
