; mypy.google.ini — claude-tdd-pro Google-Python type-strictness baseline.
; Per docs/standards/google-python-style.md. RUBRIC.yaml rule g-py-007.
;
; Append to project's pyproject.toml under [tool.mypy], or copy to
; mypy.ini at project root.

[mypy]
python_version = 3.11
strict = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = True
warn_unreachable = True
disallow_any_unimported = True
disallow_any_explicit = False
disallow_any_generics = True
disallow_untyped_defs = True
disallow_untyped_calls = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
strict_optional = True
strict_equality = True
ignore_missing_imports = False

[mypy-tests.*]
disallow_untyped_defs = False
disallow_untyped_decorators = False
