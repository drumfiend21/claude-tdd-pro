rules:
- id: g-eu-dora-ict-risk-management
  name: dora-ict-risk-management
  description: Financial entities MUST have a comprehensive ICT risk-management framework
    (DORA Article 5). Architecture MUST document the ICT risk-management strategy,
    including the governance arrangements, roles + responsibilities of the management
    body, and the reporting lines for ICT risks up to the board.
