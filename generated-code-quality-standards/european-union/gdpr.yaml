rules:
- id: g-eu-gdpr-data-minimization
  name: gdpr-data-minimization
  description: Personal-data processing MUST be adequate, relevant, and limited to
    what is necessary for the purpose (GDPR Article 5(1)(c) data minimization principle).
    Architecture MUST document the specific personal-data fields collected + the purpose
    for each field; storing fields "just in case" is a violation.
  detector: cloud-guidance-rule.sh
