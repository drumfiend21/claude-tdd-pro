- id: g-finance-pci-dss-encrypt-transmission
  name: pci-dss-encrypt-transmission
  description: Cardholder data MUST be encrypted with strong cryptography during transmission
    over open, public networks (PCI-DSS v4 Requirement 4 protect cardholder data with
    strong cryptography during transmission). Architecture MUST document the TLS version
    minimum (TLS 1.2+ required per PCI 4.2.1), the cipher-suite policy, and the certificate
    lifecycle management.
  detector: cloud-guidance-rule.sh
