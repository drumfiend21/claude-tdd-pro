- id: g-eu-gdpr-accountability
  name: gdpr-accountability
  description: Controllers MUST be able to demonstrate compliance with the data-protection
    principles (GDPR Article 5(2) accountability). Architecture MUST document (a) the
    controller/processor identity for each data flow, (b) the legal basis for each
    processing activity, (c) records-of-processing per Article 30, and (d) the DPIA
    (Data Protection Impact Assessment) reference for high-risk processing.
  detector: cloud-guidance-rule.sh
  type: problem
