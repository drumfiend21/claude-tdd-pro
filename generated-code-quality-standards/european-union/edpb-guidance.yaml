- id: g-eu-edpb-consent-guidance
  name: edpb-consent-guidance
  description: The EDPB guidance on consent (Guidelines 05/2020) requires that consent
    be freely given, specific, informed, and unambiguous, and that withdrawal be as
    easy as giving consent. Architecture MUST document the consent-capture mechanism,
    the withdrawal path, and the consent-record retention.
