- id: g-eu-gdpr-purpose-limitation
  name: gdpr-purpose-limitation
  description: Personal data MUST be collected for specified, explicit, and legitimate
    purposes and not further processed in a manner incompatible with those purposes
    (GDPR Article 5(1)(b) purpose limitation). Architecture MUST name the specific
    purpose for each processing activity; reuse for a new purpose requires a fresh
    legal basis + operator consent.
  detector: cloud-guidance-rule.sh
