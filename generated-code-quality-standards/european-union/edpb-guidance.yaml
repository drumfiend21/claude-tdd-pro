- id: g-eu-edpb-transfer-guidance
  name: edpb-transfer-guidance
  description: The EDPB guidance on international transfers (Recommendations 01/2020)
    requires a documented six-step methodology for any cross-border transfer of personal
    data (know your transfer, verify transfer tool, assess third-country law, adopt
    supplementary measures, take formal steps, re-evaluate). Architecture MUST document
    the six-step methodology outcome per transfer flow.
