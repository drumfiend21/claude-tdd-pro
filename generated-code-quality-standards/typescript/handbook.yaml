- id: g-ts-003
  name: discriminated-unions-exit-through-assertNever
  description: Switch and if/else chains over a discriminated union must end with
    an assertNever exhaustiveness assertion. Without it, a new union member added
    later silently breaks all callers.
  detector: exhaustive-unions.sh
  type: problem
  fixable: code
  has_suggestions: true
  deprecated: false
  replaced_by: []
  docs_url: https://www.typescriptlang.org/docs/handbook/2/narrowing.html#exhaustiveness-checking
  requires_type_checking: true
  recommended: true
  options_schema:
    type: object
    additionalProperties: false
  messages:
    missingAssertNever: switch over discriminated union at {{location}} missing assertNever
      default branch (typescript-handbook 2/narrowing#exhaustiveness)
  severity: P0
  version: 1.0.0
  semver: 0.1.0
  rule_state: stable
  provenance:
