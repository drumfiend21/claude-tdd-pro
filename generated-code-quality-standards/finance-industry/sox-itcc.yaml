rules:
- id: g-finance-sox-change-management
  name: sox-itcc-change-management
  description: SOX ITGC change management (PCAOB AS 2201) requires that all changes
    to financially-material systems be authorized, tested, and approved before deployment.
    Architecture MUST document (a) the change-request process, (b) test evidence retention,
    (c) approval sign-off + segregation from the developer, (d) the emergency-change
    exception path + retroactive approval.
