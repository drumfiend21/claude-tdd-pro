# standards/sources.yaml — S-1 standards catalog (plugin-shipped per §2.6
# plugin-internal schema). Each entry merges the operator-facing fields
# (id, name, url, tier, applies_to, fetch_frequency) with the plugin-
# internal fields (class, authority_tier, fragility_tier,
# fragility_strategy, fetcher, identifier_pattern, license_note, origin,
# added_by, added_at).
#
# Per §16 S-1: 17 default sources.

- id: google-tsguide
  name: "Google TypeScript Style Guide"
  url: "https://google.github.io/styleguide/tsguide.html"
  tier: 1
  applies_to: [typescript, react]
  fetch_frequency: daily
  class: published-standard
  authority_tier: 1
  fragility_tier: high
  fragility_strategy: silent-replace
  fetcher: html-anchor.sh
  identifier_pattern: "^[a-z0-9-]+$"
  license_note: "Apache-2.0"
  origin: bundled
  added_by: plugin
  added_at: "2026-01-01"

