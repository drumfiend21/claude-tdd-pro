- id: g-industry-soc2-logical-access
  name: soc2-logical-access
  description: SOC 2 Common Criteria CC6.1 requires logical and physical access controls
    that restrict access to systems and data (AICPA Trust Services Criteria). Architecture
    MUST document (a) the identity provider + authentication factors, (b) the least-
    privilege enforcement approach, (c) the account-provisioning + deprovisioning
    workflow with SLA, (d) the audit trail of access grants.
