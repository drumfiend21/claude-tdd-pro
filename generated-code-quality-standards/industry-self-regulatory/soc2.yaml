- id: g-industry-soc2-system-monitoring
  name: soc2-system-monitoring
  description: SOC 2 Common Criteria CC7.2 requires monitoring of system components
    to detect security events (AICPA Trust Services Criteria). Architecture MUST
    document (a) the monitoring approach per production system (host, network,
    application), (b) the alerting thresholds + escalation paths, (c) the incident-
    response runbook location, (d) the audit-log integrity approach.
