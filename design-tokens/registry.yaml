  - id: font.size.sm
    value: "14px"
    deprecated: false

  - id: font.size.md
    value: "16px"
    deprecated: false

  - id: font.size.lg
    value: "20px"
    deprecated: false

  - id: radius.sm
    value: "4px"
    deprecated: false

  - id: radius.md
