rules:
  - id: g-react-003
    name: a11y-p1-violations
    description: "Catches the highest-impact WCAG 2.2 violations in React components: missing alt on images (§1.3.1), focus indicators removed without alternative (§2.4.7), incorrect ARIA usage (§4.1.2). Wraps eslint-plugin-jsx-a11y rules via E-15 ESLint integration."
    detector: a11y-axe.sh
    type: problem
    fixable: code
    has_suggestions: true
    deprecated: false
    replaced_by: []
    docs_url: "https://www.w3.org/WAI/WCAG22/quickref/"
    requires_type_checking: false
    recommended: true
    options_schema:
      type: object
      additionalProperties: false
    messages:
      missingAlt: "img element missing alt attribute (wcag-2-2 §1.3.1)"
      noFocusIndicator: "outline:none without alternative focus indicator (wcag-2-2 §2.4.7)"
      ariaMisuse: "{{attribute}} used incorrectly on {{element}} (wcag-2-2 §4.1.2)"
    severity: P0
    version: "1.0.0"
    semver: "0.1.0"
    rule_state: stable
    detector_config:
