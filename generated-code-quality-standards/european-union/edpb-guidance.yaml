- id: g-eu-edpb-data-protection-by-design
  name: edpb-data-protection-by-design
  description: The EDPB guidance on data protection by design and by default (Guidelines
    04/2019) requires embedding data-protection principles into the design of processing
    activities. Architecture MUST document the seven foundational principles applied
    (proactive not reactive, privacy as the default setting, privacy embedded into
    design, full functionality, end-to-end security, visibility and transparency,
    respect for user privacy).
