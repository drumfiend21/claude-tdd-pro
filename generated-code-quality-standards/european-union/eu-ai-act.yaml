rules:
- id: g-eu-ai-act-transparency
  name: eu-ai-act-transparency
  description: Providers of high-risk AI systems MUST ensure the system is transparent
    enough for users to interpret and use the output appropriately (EU AI Act Article
    13 transparency). Architecture MUST document (a) the system's intended purpose,
    (b) capabilities and limitations, (c) known biases, (d) instructions for use,
    and (e) human-oversight measures.
  detector: cloud-guidance-rule.sh
