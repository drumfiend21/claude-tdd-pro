- id: g-eu-dora-threat-led-penetration-testing
  name: dora-threat-led-penetration-testing
  description: Financial entities that meet the criteria MUST carry out advanced testing
    by means of threat-led penetration testing (DORA Article 26 TLPT). Architecture
    MUST document the TLPT program cadence (at least every 3 years), the tester independence
    requirements, and the remediation-plan follow-up.
