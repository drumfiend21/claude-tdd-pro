- id: g-finance-pci-dss-protect-stored-data
  name: pci-dss-protect-stored-data
  description: Cardholder data storage MUST be minimized and protected (PCI-DSS v4
    Requirement 3 protect stored account data). Architecture MUST document (a) which
    account data elements are stored, (b) the retention period per element, (c) the
    encryption approach (strong cryptography with key management per Requirement 3.5),
    and (d) the truncation/tokenization strategy for PAN display.
