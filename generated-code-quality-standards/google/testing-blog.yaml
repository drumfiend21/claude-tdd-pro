rules:
- id: g-react-007
  name: component-test-required
  description: Every React component must have at least one component-level test (Vitest
    + Testing Library or Playwright component tests). Snapshot-only tests do not count
    as coverage unless options.allow_snapshot_only is true.
  detector: rsc-boundary.sh
  type: problem
  fixable:
  has_suggestions: false
  deprecated: false
  replaced_by: []
  docs_url: https://testing.googleblog.com/2018/02/testing-on-toilet-cheap-tests-vs-good.html
  requires_type_checking: false
  recommended: true
  options_schema:
    type: object
    additionalProperties: false
    properties:
      test_runner:
        type: string
        enum:
        - vitest
        - playwright
      allow_snapshot_only:
        type: boolean
  messages:
    noTest: component {{component}} has no associated test file (looked for {{paths}})
    snapshotOnly: component {{component}} only has snapshot tests; require at least
      one behavioral assertion
  severity: P1
  version: 1.0.0
  semver: 0.1.0
  rule_state: stable
  provenance:
