- id: g-finance-sox-segregation-of-duties
  name: sox-itcc-segregation-of-duties
  description: SOX ITGC requires segregation of duties for financially-material systems
    (PCAOB AS 2201). Architecture MUST document (a) the roles that CANNOT be held
    by the same person (e.g. developer cannot also approve production release; whoever
    provisions cannot also audit), (b) the compensating controls where segregation
    is impractical, (c) the review cadence of role assignments.
  detector: cloud-guidance-rule.sh
