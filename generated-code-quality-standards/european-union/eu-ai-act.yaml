- id: g-eu-ai-act-human-oversight
  name: eu-ai-act-human-oversight
  description: High-risk AI systems MUST be designed to allow effective oversight
    by natural persons during the period of use (EU AI Act Article 14 human oversight).
    Architecture MUST document the human-in-the-loop or human-on-the-loop measures,
    when human intervention is required, and the training the operator receives.
