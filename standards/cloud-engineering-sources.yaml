# Cloud-architecture software-engineering sources (S-30, v1.12 §27.13).
#
# Authoritative best-practice sources for the SOFTWARE DEVELOPMENT of cloud
# architecture - the syntax and patterning of IaC and cloud-native code. These
# were secured (URLs verified 2026-06-08) because the S-23 architecture seed,
# while strong on Well-Architected guidance and design patterns, did not carry
# dedicated style/convention authorities for Terraform, Bicep, CloudFormation,
# or general software engineering. The S-30 convention rulesets ground their
# rules in these source ids (cite-or-decline).
#
# Same schema as the S-23 catalog, plus a `discipline: [syntax|patterning]`
# tag marking what kind of software-development concern the source governs.

